name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: "check (${{ matrix.name }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default (candle-cpu)
            features: ""
            check_only: false
          - name: llamacpp
            features: "llamacpp"
            check_only: false
          - name: coreml
            features: "coreml"
            check_only: false
          - name: qnn
            features: "qnn"
            check_only: false

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.name }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.name }}-
            ${{ runner.os }}-cargo-

      - name: cargo check
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo check --workspace --features "${{ matrix.features }}"
          else
            cargo check --workspace
          fi

      - name: cargo clippy
        if: ${{ !matrix.check_only }}
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo clippy --workspace --all-targets --features "${{ matrix.features }}"
          else
            cargo clippy --workspace --all-targets
          fi

      - name: cargo test
        if: ${{ !matrix.check_only }}
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo test --workspace --features "${{ matrix.features }}"
          else
            cargo test --workspace
          fi

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
